<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pull Requests</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="header">
        <h1>My Pull Requests</h1>
        <button id="settingsBtn" title="Settings">⚙️</button>
    </div>

    <div id="content">
        <div class="section">
            <h2>Assigned to me <span class="badge" id="assignedCount">-</span></h2>
            <ul id="assignedList" class="pr-list">Loading...</ul>
        </div>

        <div class="section">
            <h2>My active reviews <span class="badge" id="reviewedCount">-</span></h2>
            <ul id="reviewedList" class="pr-list">Loading...</ul>
        </div>
    </div>

    <script src="services/adoApi.js"></script>
    <script src="popup.js"></script>
</body>

</html>
