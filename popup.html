<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pull Requests</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 8px;">
            <img src="icon16.png" width="20" height="20" alt="Logo">
            <h1>My Pull Requests</h1>
        </div>
        <div style="display: flex; gap: 8px;">
            <select id="sortSelect"
                style="padding: 2px 4px; font-size: 11px; border-radius: 4px; background: white; color: #333; border: 1px solid #ccc; max-width: 140px;">
                <option value="recent">Most recent</option>
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
            </select>
            <button id="settingsBtn" title="Settings">⚙️</button>
        </div>
    </div>

    <div id="content">
        <div class="section">
            <h2>Assigned to me <span class="badge" id="assignedCount">-</span></h2>
            <ul id="assignedList" class="pr-list">Loading...</ul>
        </div>

        <div class="section">
            <h2>My active reviews <span class="badge" id="reviewedCount">-</span></h2>
            <ul id="reviewedList" class="pr-list">Loading...</ul>
        </div>
    </div>

    <script src="services/adoApi.js"></script>
    <script src="popup.js"></script>
</body>

</html>
