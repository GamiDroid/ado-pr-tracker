<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>PR Tracker - Instellingen</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Tracker Instellingen</h1>
        
        <div class="form-group">
            <label for="orgName">Azure DevOps Organisatie (bijv. 'mijn-org'):</label>
            <input type="text" id="orgName" placeholder="Mijn Organisatie">
        </div>

        <div class="form-group">
            <label for="projectName">Project Naam:</label>
            <input type="text" id="projectName" placeholder="Mijn Project">
        </div>

        <div class="form-group">
            <label for="patToken">Personal Access Token (PAT):</label>
            <input type="password" id="patToken" placeholder="Plak hier je PAT">
            <small>Maak een token in Azure DevOps met 'Pull Request Threads - Read & write' permissie.</small>
        </div>

        <div class="form-group">
            <label for="userEmail">Jouw E-mailadres (in Azure DevOps):</label>
            <input type="text" id="userEmail" placeholder="naam@bedrijf.nl">
            <small>Dit wordt gebruikt om jouw specifieke PR's en reviews op te zoeken.</small>
        </div>

        <button id="saveBtn">Opslaan</button>
        <span id="statusMessage"></span>
    </div>
    <script src="options.js"></script>
</body>
</html>
