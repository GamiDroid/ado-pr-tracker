<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>PR Tracker - Settings</title>
    <link rel="icon" href="icon16.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
            <img src="icon48.png" width="32" height="32" alt="Logo">
            <h1 style="margin: 0; padding: 0; border: none;">Tracker Settings</h1>
        </div>
        
        <div class="form-group">
            <label for="orgName">Azure DevOps Organization (e.g. 'my-org'):</label>
            <input type="text" id="orgName" placeholder="My Organization">
        </div>

        <div class="form-group">
            <label for="projectName">Project Name:</label>
            <input type="text" id="projectName" placeholder="My Project">
        </div>

        <div class="form-group">
            <label for="patToken">Personal Access Token (PAT):</label>
            <input type="password" id="patToken" placeholder="Paste your PAT here">
            <small>Create a token in Azure DevOps with 'Pull Request Threads - Read & write' permission.</small>
        </div>

        <div class="form-group">
            <label for="userEmail">Your Email Address (in Azure DevOps):</label>
            <input type="text" id="userEmail" placeholder="name@company.com">
            <small>This is used to find your specific PRs and reviews.</small>
        </div>

        <button id="saveBtn">Save</button>
        <span id="statusMessage"></span>

        <div class="app-version">
            Version <span id="appVersion">-</span>
        </div>
    </div>
    <script src="options.js"></script>
</body>
</html>
